<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="preload" href="../CSS/style.css" as="style">
    <link rel="stylesheet" href="../CSS/normalize.css">
    <link rel="preload" href="../CSS/normalize.css" as="style">
    <script src="../js/app.js" defer></script>
    <title>Horarios</title>
</head>
<body class="body--duo">
    <header class="logo--header">
        <div>
            <img src="../assets/logo el limite 100x100 gris.png">
        </div>
        <div>
            <a class="salir" href="../index.html">Pagina de inicio</a>
        </div>
    </header>

    <nav class="botones--index" style="justify-content: space-around; width: 100%; max-width: 1200px; margin: 0 auto;">
        <div class="buscador-fecha" style="width: auto; background: white; padding: 0.5rem 1.5rem; border-radius: 8px; border: 1px solid #ccc;">
            <label for="buscar-fecha">Consultar Día:</label>
            <input type="date" id="buscar-fecha" class="input-tabla" style="width: 150px; border: none; font-size: 1.6rem;">
        </div>
        <button id="btn-exportar-horarios" class="Horarios" style="background-color: #28a745; color: white; border-color: #1e7e34; margin: 0;">Exportar Horarios</button>
    </nav>

    <main class="contenedor-lista">
        <section class="tabla-choferes" id="tabla-horarios-body">
            <!-- Cabecera de la tabla de horarios -->
            <div class="fila fila-header">
                <div class="columna-check"><input type="checkbox" id="select-all"></div>
                <p class="columna-nombre">Chofer</p>
                <p class="columna-movil">Móvil Asignado</p>
                <p class="columna-entrada">Entrada</p>
                <p class="columna-hora">Horario Entrada</p>
                <p class="columna-salida">Salida</p>
                <p class="columna-hora">Horario Salida</p>
                <p class="columna-acciones">Acciones</p>
            </div>

            <!-- Las filas se generarán automáticamente desde app.js -->
        </section>
    </main>

    <!-- Listas desplegables para búsqueda -->
    <datalist id="lista-moviles-datalist"></datalist>
    <datalist id="lista-choferes-datalist"></datalist>

    <!-- Modal para Exportar Horarios por Rango -->
    <div id="modal-exportar" class="modal-overlay oculto">
        <div class="modal-contenido">
            <h2>Exportar Reporte de Horarios</h2>
            <div class="campo">
                <label for="exportar-desde">Desde Fecha:</label>
                <input type="date" id="exportar-desde" class="input-tabla">
            </div>
            <div class="campo">
                <label for="exportar-hasta">Hasta Fecha:</label>
                <input type="date" id="exportar-hasta" class="input-tabla">
            </div>
            <div class="modal-botones">
                <button id="btn-confirmar-exportar" class="btn-borrar" style="background-color: var(--AzulMedio);">Exportar</button>
                <button id="btn-cancelar-exportar" class="btn-borrar">Cancelar</button>
            </div>
        </div>
    </div>
</body>
</html>
