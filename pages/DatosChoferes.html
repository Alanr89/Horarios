<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="preload" href="../CSS/style.css" as="style">
    <link rel="stylesheet" href="../CSS/normalize.css">
    <link rel="preload" href="../CSS/normalize.css" as="style">
    <script src="../js/datosChoferes.js" defer></script>
    <title>Datos de choferes</title>
</head>
<body class="body--duo">
    <header class="logo--header">
        <div>
            <img src="../assets/logo el limite 100x100 gris.png">
        </div>
        <div>
            <a class="salir" href="../index.html">Pagina de inicio</a>
        </div>
    </header>
    <nav class="botones--index">
        <button id="btn-agregar-chofer" class="DatosChoferes">Agregar chofer</button>
        <button id="btn-modificar-chofer" class="Horarios">Modificar chofer</button>
        <button id="btn-agregar-movil" class="Horarios">Agregar móvil</button>
        <button id="btn-modificar-movil" class="Horarios">Modificar móvil</button>
        <button id="btn-exportar" class="Horarios" style="background-color: #28a745; color: white; border-color: #1e7e34;">Exportar información</button>
    </nav>

    <main class="contenedor-lista">
        <!-- Las tablas de Choferes y Móviles se generarán aquí desde app.js -->
        <div id="lista-cuerpo"></div>
        
        <div style="text-align: center; margin-top: 1rem;">
            <button id="btn-nueva-fila" class="btn-entrada" style="width: auto; padding: 1rem 3rem; font-size: 2rem;">+ Agregar Fila</button>
        </div>

        <!-- Listas desplegables para búsqueda (Datalists) -->
        <datalist id="lista-moviles-datalist"></datalist>
        <datalist id="lista-choferes-datalist"></datalist>
    </main>

    <!-- Ventana Flotante (Modal) -->
    <div id="modal-contenedor" class="modal-overlay oculto">
        <div class="modal-contenido">
            <h2 id="modal-titulo">Agregar Nuevo</h2>
            
            <!-- Formulario para Chofer -->
            <div id="form-chofer" class="form-container oculto">
                <div class="campo">
                    <label for="chofer-nombre">Nombre y Apellido</label>
                    <input type="text" id="chofer-nombre" class="input-tabla" placeholder="Ej: Juan Pérez">
                </div>
                <div class="campo">
                    <label for="chofer-direccion">Dirección</label>
                    <input type="text" id="chofer-direccion" class="input-tabla" placeholder="Calle 123">
                </div>
                <div class="campo">
                    <label>Teléfono</label>
                    <div class="campo-doble">
                        <input type="number" id="chofer-cod-area" class="input-tabla" placeholder="Cód. área" oninput="if(this.value.length > 3) this.value = this.value.slice(0, 3);">
                        <input type="number" id="chofer-nro-tel" class="input-tabla" placeholder="Nro" oninput="if(this.value.length > 8) this.value = this.value.slice(0, 8);">
                    </div>
                </div>
                <div class="campo">
                    <label for="chofer-dni">DNI</label>
                    <input type="number" id="chofer-dni" class="input-tabla" placeholder="Solo números">
                </div>
                <div class="campo-doble">
                    <div class="campo">
                        <label>Licencia (Desde)</label>
                        <input type="date" id="chofer-licencia-desde" class="input-tabla">
                    </div>
                    <div class="campo">
                        <label>Licencia (Hasta)</label>
                        <input type="date" id="chofer-licencia-hasta" class="input-tabla">
                    </div>
                </div>
            </div>

            <!-- Formulario para Móvil -->
            <div id="form-movil" class="form-container oculto">
                <div class="campo">
                    <label for="movil-numero">Número de Móvil</label>
                    <input type="number" id="movil-numero" class="input-tabla" placeholder="Ej: 101">
                </div>
                <div class="campo">
                    <label for="movil-marca">Marca</label>
                    <input type="text" id="movil-marca" class="input-tabla" placeholder="Ej: Toyota">
                </div>
                <div class="campo-doble">
                    <div class="campo">
                        <label for="movil-modelo">Modelo</label>
                        <input type="text" id="movil-modelo" class="input-tabla" placeholder="Ej: Corolla">
                    </div>
                    <div class="campo">
                        <label for="movil-patente">Patente</label>
                        <input type="text" id="movil-patente" class="input-tabla" placeholder="ABC-123">
                    </div>
                </div>
            </div>

            <div class="modal-botones">
                <button id="btn-modal-confirmar" class="btn-borrar" style="background-color: var(--AzulMedio);">Confirmar</button>
                <button id="btn-modal-cancelar" class="btn-borrar">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal para Modificar Móvil (Búsqueda y Edición) -->
    <div id="modal-modificar-movil" class="modal-overlay oculto">
        <div class="modal-contenido">
            <h2>Modificar Datos del Móvil</h2>
            <div class="campo">
                <label for="buscar-movil-edit">Seleccionar Móvil (Número):</label>
                <select id="buscar-movil-edit" class="input-tabla">
                    <option value="">-- Seleccione un móvil --</option>
                </select>
            </div>
            
            <div id="form-modificar-movil-campos" class="oculto">
                <hr>
                <div class="campo">
                    <label for="edit-movil-numero">Número de Móvil</label>
                    <input type="number" id="edit-movil-numero" class="input-tabla" readonly>
                </div>
                <div class="campo">
                    <label for="edit-movil-marca">Marca</label>
                    <input type="text" id="edit-movil-marca" class="input-tabla">
                </div>
                <div class="campo-doble">
                    <div class="campo">
                        <label for="edit-movil-modelo">Modelo</label>
                        <input type="text" id="edit-movil-modelo" class="input-tabla">
                    </div>
                    <div class="campo">
                        <label for="edit-movil-patente">Patente</label>
                        <input type="text" id="edit-movil-patente" class="input-tabla">
                    </div>
                </div>
            </div>

            <div class="modal-botones" style="flex-wrap: wrap; gap: 10px;">
                <button id="btn-confirmar-mod-movil" class="btn-borrar" style="background-color: var(--AzulMedio); flex: 1;">Guardar Cambios</button>
                <button id="btn-cancelar-mod-movil" class="btn-borrar" style="flex: 1;">Cancelar</button>
                <button id="btn-borrar-movil-db" class="btn-borrar" style="width: 100%; margin-top: 10px;">Borrar Móvil</button>
            </div>
        </div>
    </div>

    <!-- Modal para Modificar Chofer -->
    <div id="modal-modificar-chofer" class="modal-overlay oculto">
        <div class="modal-contenido">
            <h2>Modificar Datos del Chofer</h2>
            <div class="campo">
                <label for="select-chofer-edit">Seleccionar Chofer:</label>
                <select id="select-chofer-edit" class="input-tabla">
                    <option value="">-- Seleccione un chofer --</option>
                </select>
            </div>
            
            <div id="form-modificar-chofer-campos" class="oculto">
                <hr>
                <div class="campo">
                    <label for="edit-chofer-nombre">Nombre y Apellido</label>
                    <input type="text" id="edit-chofer-nombre" class="input-tabla">
                </div>
                <div class="campo">
                    <label for="edit-chofer-direccion">Dirección</label>
                    <input type="text" id="edit-chofer-direccion" class="input-tabla">
                </div>
                <div class="campo">
                    <label>Teléfono</label>
                    <div class="campo-doble">
                        <input type="number" id="edit-chofer-cod-area" class="input-tabla" placeholder="Cód. área" oninput="if(this.value.length > 3) this.value = this.value.slice(0, 3);">
                        <input type="number" id="edit-chofer-nro-tel" class="input-tabla" placeholder="Nro" oninput="if(this.value.length > 8) this.value = this.value.slice(0, 8);">
                    </div>
                </div>
                <div class="campo">
                    <label for="edit-chofer-dni">DNI</label>
                    <input type="number" id="edit-chofer-dni" class="input-tabla">
                </div>
                <div class="campo-doble">
                    <div class="campo">
                        <label>Licencia (Desde)</label>
                        <input type="date" id="edit-chofer-licencia-desde" class="input-tabla">
                    </div>
                    <div class="campo">
                        <label>Licencia (Hasta)</label>
                        <input type="date" id="edit-chofer-licencia-hasta" class="input-tabla">
                    </div>
                </div>
            </div>

            <div class="modal-botones" style="flex-wrap: wrap; gap: 10px;">
                <button id="btn-confirmar-mod-chofer" class="btn-borrar" style="background-color: var(--AzulMedio); flex: 1;">Guardar Cambios</button>
                <button id="btn-cancelar-mod-chofer" class="btn-borrar" style="flex: 1;">Cancelar</button>
                <button id="btn-borrar-chofer-db" class="btn-borrar" style="width: 100%; margin-top: 10px;">Borrar Chofer</button>
            </div>
        </div>
    </div>
</body>
</html>
